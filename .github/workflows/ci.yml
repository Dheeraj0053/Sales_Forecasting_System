name: CI

on:
  push:
  pull_request:

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: pytest -q

      - name: Compile check
        run: python -m compileall src api

      - name: Training smoke test (fast models)
        env:
          ENABLED_MODELS: arima,xgboost
        run: |
          python scripts/generate_sample_data.py
          python -m src.train
          test -f artifacts/registry.json

      - name: API import smoke test
        run: |
          python -c "from api.main import app; print(app.title)"
